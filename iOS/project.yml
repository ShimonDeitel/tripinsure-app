name: Tripinsure
options:
  bundleIdPrefix: com.shimondeitel.tripinsure
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Tripinsure:
    type: application
    platform: iOS
    sources:
      - path: Tripinsure
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tripinsure
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Tripinsure/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TripinsureTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TripinsureTests
      - path: Tripinsure.storekit
    dependencies:
      - target: Tripinsure
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tripinsure.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TripinsureUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TripinsureUITests
    dependencies:
      - target: Tripinsure
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tripinsure.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Tripinsure:
    build:
      targets:
        Tripinsure: all
        TripinsureTests: [test]
        TripinsureUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Tripinsure.storekit
    test:
      config: Debug
      storeKitConfiguration: Tripinsure.storekit
      targets:
        - TripinsureTests
        - TripinsureUITests
    archive:
      config: Release
